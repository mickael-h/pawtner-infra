# Pawtner infrastructure: PostgreSQL + Keycloak (API added in step 2)
# One Postgres container with two databases: keycloak_db, pawtner_db (see docs/ARCHITECTURE.md)

services:
  postgres:
    image: postgres:16-alpine
    container_name: pawtner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pawtner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-pawtner} -d ${POSTGRES_DB:-postgres}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: pawtner-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?Set KEYCLOAK_ADMIN_PASSWORD in .env}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: ${KC_DB_USERNAME:-pawtner}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:?Set KC_DB_PASSWORD in .env}
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"
    volumes:
      - ./keycloak/themes:/opt/keycloak/themes:ro
      - ./keycloak/realm/${KEYCLOAK_REALM_IMPORT_FILE:-pawtner-realm.dev.json}:/opt/keycloak/data/import/pawtner-realm.json:ro
    ports:
      - "${KEYCLOAK_HTTP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Minimal image has no curl/wget; use bash TCP connect check on app port.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  keycloak-bootstrap:
    image: quay.io/keycloak/keycloak:latest
    container_name: pawtner-keycloak-bootstrap
    restart: "no"
    entrypoint: ["/bin/bash", "-ec"]
    command:
      - /opt/keycloak/bin/kcadm.sh config credentials --server http://keycloak:8080 --realm master --user ${KEYCLOAK_ADMIN:-admin} --password ${KEYCLOAK_ADMIN_PASSWORD:?Set KEYCLOAK_ADMIN_PASSWORD in .env} && if ! /opt/keycloak/bin/kcadm.sh get realms/pawtner >/dev/null 2>&1; then /opt/keycloak/bin/kcadm.sh create realms -s realm=pawtner -s enabled=true -s registrationAllowed=true -s loginWithEmailAllowed=true -s duplicateEmailsAllowed=false -s resetPasswordAllowed=true -s rememberMe=true -s sslRequired=external -s loginTheme=pawtner; fi && /opt/keycloak/bin/kcadm.sh update realms/pawtner -s enabled=true -s registrationAllowed=true -s loginWithEmailAllowed=true -s duplicateEmailsAllowed=false -s resetPasswordAllowed=true -s rememberMe=true -s sslRequired=external -s loginTheme=pawtner && /opt/keycloak/bin/kcadm.sh create partialImport -r pawtner -f /opt/keycloak/data/import/pawtner-partial.json
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ./keycloak/realm/${KEYCLOAK_BOOTSTRAP_FILE:-pawtner-partial.dev.json}:/opt/keycloak/data/import/pawtner-partial.json:ro

volumes:
  postgres_data:
